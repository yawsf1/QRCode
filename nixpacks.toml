[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_22"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci --ignore-scripts",
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:clear",
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=SuperAdminUserSeeder --force && php artisan serve --host=0.0.0.0 --port=$PORT"