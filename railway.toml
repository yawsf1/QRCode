[build]
builder = "nixpacks"
buildCommand = "composer install --no-dev --optimize-autoloader && npm ci && npm run build"

[deploy]
php artisan migrate --force && php artisan db:seed --class=SuperAdminUserSeeder --force && php artisan reverb:start --host=0.0.0.0 --port=8080 & php artisan serve --host=0.0.0.0 --port=$PORT
healthcheckPath = "/up"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
